<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Neon Snake</title>
  <style>
    :root{
      --bg0:#050816;
      --bg1:#0b1026;
      --neonA:#00f5ff;
      --neonB:#ff2bd6;
      --neonC:#7CFF6B;
      --text:#e9f2ff;
      --muted:#9fb3d9;
      --panel: rgba(15, 22, 48, .72);
      --stroke: rgba(255,255,255,.10);
      --grid: rgba(255,255,255,.06);
      --danger:#ff3d5a;
      --gold:#ffd36a;
    }
 
    *{ box-sizing:border-box; }
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:var(--text);
      background:
        radial-gradient(900px 600px at 15% 20%, rgba(0,245,255,.20), transparent 55%),
        radial-gradient(800px 540px at 85% 30%, rgba(255,43,214,.18), transparent 55%),
        radial-gradient(900px 650px at 50% 90%, rgba(124,255,107,.10), transparent 55%),
        linear-gradient(180deg, var(--bg1), var(--bg0));
    }
 
    .app{
      width:min(980px, 100%);
      display:grid;
      grid-template-columns: 1fr 320px;
      gap:14px;
    }
    @media (max-width: 860px){
      .app{ grid-template-columns: 1fr; }
    }
 
    .card{
      background: var(--panel);
      border:1px solid var(--stroke);
      border-radius:18px;
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      overflow:hidden;
    }
 
    .header{
      padding:14px 16px;
      border-bottom:1px solid var(--stroke);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }
    .title{
      display:flex;
      flex-direction:column;
      gap:3px;
    }
    .title h1{
      margin:0;
      font-size:16px;
      letter-spacing:.3px;
    }
    .title .sub{
      color:var(--muted);
      font-size:12px;
    }
 
    .pill{
      display:flex;
      gap:10px;
      align-items:center;
      padding:8px 10px;
      border-radius:999px;
      border:1px solid var(--stroke);
      background: rgba(255,255,255,.04);
      font-weight:800;
      font-size:12px;
      letter-spacing:.3px;
      white-space:nowrap;
    }
 
    .pill .label{ color:var(--muted); font-weight:700; }
    .pill .value{
      color:var(--neonA);
      text-shadow: 0 0 14px rgba(0,245,255,.35);
    }
 
    .canvasWrap{
      padding:14px;
      display:flex;
      align-items:center;
      justify-content:center;
    }
 
    canvas{
      width:min(560px, 100%);
      height:auto;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.10);
      box-shadow:
        0 0 0 1px rgba(0,245,255,.10),
        0 0 35px rgba(0,245,255,.08),
        0 0 65px rgba(255,43,214,.06);
      background: #050814;
    }
 
    .side{
      padding:14px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }
 
    .statGrid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:10px;
    }
    .stat{
      padding:12px;
      border-radius:14px;
      border:1px solid var(--stroke);
      background: rgba(255,255,255,.04);
    }
    .stat .k{ color:var(--muted); font-size:11px; }
    .stat .v{
      margin-top:6px;
      font-size:18px;
      font-weight:900;
      letter-spacing:.3px;
      text-shadow: 0 0 16px rgba(0,245,255,.18);
    }
 
    .btnRow{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:10px;
    }
    button{
      padding:10px 12px;
      border-radius:14px;
      border:1px solid var(--stroke);
      background: rgba(255,255,255,.06);
      color:var(--text);
      font-weight:900;
      cursor:pointer;
      transition: .15s ease;
    }
    button:hover{
      background: rgba(255,255,255,.10);
      transform: translateY(-1px);
    }
    button:active{ transform: translateY(0px); }
 
    .hint{
      color:var(--muted);
      font-size:12px;
      line-height:1.45;
      border-top:1px solid var(--stroke);
      padding-top:10px;
      margin-top:auto;
    }
    .kbd{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size:11px;
      padding:2px 6px;
      border-radius:8px;
      border:1px solid rgba(255,255,255,.16);
      background: rgba(255,255,255,.06);
      color: var(--text);
    }
 
    /* Overlay */
    .overlay{
      position: fixed;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      background: rgba(0,0,0,.55);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      padding:18px;
    }
    .overlay.show{ display:flex; }
    .modal{
      width:min(520px, 100%);
      border-radius:18px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(10,14,34,.85);
      box-shadow: 0 30px 90px rgba(0,0,0,.5);
      padding:16px;
      text-align:center;
      position:relative;
      overflow:hidden;
    }
    .modal:before{
      content:"";
      position:absolute;
      inset:-120px;
      background:
        radial-gradient(closest-side, rgba(0,245,255,.18), transparent 60%),
        radial-gradient(closest-side, rgba(255,43,214,.14), transparent 60%);
      filter: blur(10px);
      z-index:0;
    }
    .modal > *{ position:relative; z-index:1; }
    .modal h2{
      margin:6px 0 4px;
      font-size:20px;
      letter-spacing:.3px;
    }
    .modal p{ margin:0; color:var(--muted); }
    .modal .big{
      margin:12px 0 6px;
      font-size:44px;
      font-weight:1000;
      color: var(--gold);
      text-shadow: 0 0 20px rgba(255,211,106,.25);
    }
  </style>
</head>
 
<body>
  <div class="app">
    <div class="card">
      <div class="header">
        <div class="title">
          <h1>NEON SNAKE</h1>
          <div class="sub">Eat the glowing food. Don’t hit walls or yourself.</div>
        </div>
        <div class="pill"><span class="label">SCORE</span> <span id="scoreTop" class="value">0</span></div>
      </div>
      <div class="canvasWrap">
        <canvas id="game" width="560" height="560"></canvas>
      </div>
    </div>
 
    <aside class="card side">
      <div class="statGrid">
        <div class="stat">
          <div class="k">Score</div>
          <div id="score" class="v">0</div>
        </div>
        <div class="stat">
          <div class="k">Best</div>
          <div id="best" class="v">0</div>
        </div>
        <div class="stat">
          <div class="k">Speed</div>
          <div id="speed" class="v">1.0x</div>
        </div>
        <div class="stat">
          <div class="k">Status</div>
          <div id="status" class="v" style="color:var(--neonC); text-shadow:0 0 16px rgba(124,255,107,.18)">READY</div>
        </div>
      </div>
 
      <div class="btnRow">
        <button id="startBtn">Start</button>
        <button id="restartBtn">Restart</button>
      </div>
 
      <div class="hint">
        Controls:
        <div style="margin-top:6px">
          <span class="kbd">↑</span> <span class="kbd">↓</span> <span class="kbd">←</span> <span class="kbd">→</span>
          &nbsp;or&nbsp;
          <span class="kbd">W</span><span class="kbd">A</span><span class="kbd">S</span><span class="kbd">D</span>
        </div>
        <div style="margin-top:8px">
          Pause/Resume: <span class="kbd">Space</span>
        </div>
      </div>
    </aside>
  </div>
 
  <div id="overlay" class="overlay" aria-hidden="true">
    <div class="modal">
      <h2>NOAH EAT SHIT</h2>
      <div class="big" id="finalScore">0</div>
      <p id="finalText">Your score</p>
      <div style="height:12px"></div>
      <div class="btnRow" style="grid-template-columns: 1fr;">
        <button id="playAgainBtn">Play Again</button>
      </div>
    </div>
  </div>
 
<script>
(() => {
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
 
  // UI
  const scoreEl = document.getElementById("score");
  const scoreTopEl = document.getElementById("scoreTop");
  const bestEl = document.getElementById("best");
  const speedEl = document.getElementById("speed");
  const statusEl = document.getElementById("status");
  const startBtn = document.getElementById("startBtn");
  const restartBtn = document.getElementById("restartBtn");
  const overlay = document.getElementById("overlay");
  const finalScoreEl = document.getElementById("finalScore");
  const finalTextEl = document.getElementById("finalText");
  const playAgainBtn = document.getElementById("playAgainBtn");
 
  // Settings
  const CELL = 20;
  const GRID = canvas.width / CELL; // 28 on 560px
  const COLORS = {
    bg: "#050814",
    grid: "rgba(255,255,255,.05)",
    snakeHead: "#00f5ff",
    snakeBody: "#00c0ff",
    food: "#ff2bd6",
    glowA: "rgba(0,245,255,.35)",
    glowB: "rgba(255,43,214,.35)",
  };
 
  // State
  let snake, dir, nextDir, food, score, best, running, paused;
  let baseInterval = 110; // ms
  let tickMs = baseInterval;
  let timer = null;
 
  function loadBest() {
    const v = Number(localStorage.getItem("neonSnakeBest") || "0");
    best = isFinite(v) ? v : 0;
    bestEl.textContent = best;
  }
 
  function setScore(v) {
    score = v;
    scoreEl.textContent = score;
    scoreTopEl.textContent = score;
    if (score > best) {
      best = score;
      bestEl.textContent = best;
      localStorage.setItem("neonSnakeBest", String(best));
    }
  }
 
  function setStatus(text, colorVar="--neonC") {
    statusEl.textContent = text;
    statusEl.style.color = `var(${colorVar})`;
  }
 
  function resetGame() {
    const mid = Math.floor(GRID / 2);
    snake = [
      { x: mid, y: mid },
      { x: mid - 1, y: mid },
      { x: mid - 2, y: mid }
    ];
    dir = { x: 1, y: 0 };
    nextDir = dir;
    placeFood();
    setScore(0);
    running = false;
    paused = false;
    tickMs = baseInterval;
    speedEl.textContent = "1.0x";
    setStatus("READY", "--neonC");
    hideOverlay();
    draw();
  }
 
  function placeFood() {
    while (true) {
      const x = Math.floor(Math.random() * GRID);
      const y = Math.floor(Math.random() * GRID);
      const hitsSnake = snake?.some(p => p.x === x && p.y === y);
      if (!hitsSnake) { food = { x, y }; return; }
    }
  }
 
  function start() {
    if (running) return;
    running = true;
    paused = false;
    setStatus("RUNNING", "--neonA");
    loop();
  }
 
  function loop() {
    clearInterval(timer);
    timer = setInterval(tick, tickMs);
  }
 
  function pauseToggle() {
    if (!running) return;
    paused = !paused;
    if (paused) {
      setStatus("PAUSED", "--gold");
    } else {
      setStatus("RUNNING", "--neonA");
    }
  }
 
  function gameOver() {
    running = false;
    clearInterval(timer);
    setStatus("GAME OVER", "--danger");
    showOverlay(score);
  }
 
  function tick() {
    if (!running || paused) return;
 
    // apply queued direction (prevents instant reverse)
    dir = nextDir;
 
    const head = snake[0];
    const newHead = { x: head.x + dir.x, y: head.y + dir.y };
 
    // wall collision
    if (newHead.x < 0 || newHead.y < 0 || newHead.x >= GRID || newHead.y >= GRID) {
      gameOver(); return;
    }
 
    // self collision
    if (snake.some((p, i) => i > 0 && p.x === newHead.x && p.y === newHead.y)) {
      gameOver(); return;
    }
 
    snake.unshift(newHead);
 
    // eat
    if (newHead.x === food.x && newHead.y === food.y) {
      setScore(score + 1);
      placeFood();
 
      // speed up every 5 points (gentle)
      if (score > 0 && score % 5 === 0) {
        tickMs = Math.max(55, tickMs - 10);
        const mult = (baseInterval / tickMs).toFixed(1);
        speedEl.textContent = `${mult}x`;
        loop();
      }
    } else {
      snake.pop();
    }
 
    draw();
  }
 
  function drawGrid() {
    ctx.strokeStyle = COLORS.grid;
    ctx.lineWidth = 1;
 
    for (let i = 0; i <= GRID; i++) {
      const p = i * CELL;
      ctx.beginPath();
      ctx.moveTo(p, 0);
      ctx.lineTo(p, canvas.height);
      ctx.stroke();
 
      ctx.beginPath();
      ctx.moveTo(0, p);
      ctx.lineTo(canvas.width, p);
      ctx.stroke();
    }
  }
 
  function drawGlowRect(x, y, color) {
    ctx.save();
    ctx.shadowBlur = 18;
    ctx.shadowColor = color;
    ctx.fillRect(x, y, CELL, CELL);
    ctx.restore();
  }
 
  function draw() {
    // background
    ctx.fillStyle = COLORS.bg;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
 
    drawGrid();
 
    // food (neon glow)
    const fx = food.x * CELL, fy = food.y * CELL;
    ctx.fillStyle = COLORS.food;
    drawGlowRect(fx, fy, COLORS.glowB);
    ctx.fillStyle = COLORS.food;
    ctx.fillRect(fx + 4, fy + 4, CELL - 8, CELL - 8);
 
    // snake
    for (let i = 0; i < snake.length; i++) {
      const p = snake[i];
      const x = p.x * CELL, y = p.y * CELL;
 
      if (i === 0) {
        // head
        ctx.fillStyle = COLORS.snakeHead;
        ctx.save();
        ctx.shadowBlur = 22;
        ctx.shadowColor = COLORS.glowA;
        ctx.fillRect(x, y, CELL, CELL);
        ctx.restore();
 
        ctx.fillStyle = "#062331";
        ctx.fillRect(x + 6, y + 6, CELL - 12, CELL - 12);
      } else {
        // body
        ctx.fillStyle = COLORS.snakeBody;
        ctx.save();
        ctx.shadowBlur = 12;
        ctx.shadowColor = "rgba(0,192,255,.18)";
        ctx.fillRect(x + 1, y + 1, CELL - 2, CELL - 2);
        ctx.restore();
      }
    }
  }
 
  function setDirection(dx, dy) {
    // block reverse
    if (dir.x === -dx && dir.y === -dy) return;
    nextDir = { x: dx, y: dy };
  }
 
  function showOverlay(finalScore) {
    finalScoreEl.textContent = finalScore;
    finalTextEl.textContent = `Score: ${finalScore}  •  Best: ${best}`;
    overlay.classList.add("show");
    overlay.setAttribute("aria-hidden", "false");
  }
 
  function hideOverlay() {
    overlay.classList.remove("show");
    overlay.setAttribute("aria-hidden", "true");
  }
 
  // Controls
  window.addEventListener("keydown", (e) => {
    const k = e.key.toLowerCase();
    if (k === "arrowup" || k === "w") setDirection(0, -1);
    else if (k === "arrowdown" || k === "s") setDirection(0, 1);
    else if (k === "arrowleft" || k === "a") setDirection(-1, 0);
    else if (k === "arrowright" || k === "d") setDirection(1, 0);
    else if (k === " ") { e.preventDefault(); pauseToggle(); }
  });
 
  startBtn.addEventListener("click", start);
  restartBtn.addEventListener("click", resetGame);
  playAgainBtn.addEventListener("click", () => { resetGame(); start(); });
 
  // Init
  loadBest();
  resetGame();
})();
</script>
</body>
</html>

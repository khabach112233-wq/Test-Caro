<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Caro (HTML Only)</title>
<style>
body { text-align:center; font-family:Arial; background:#0b1220; color:white; }
h2 { margin-top:10px; }
#board {
  display:grid;
  grid-template-columns: repeat(15, 35px);
  width:max-content;
  margin:20px auto;
}
.cell {
  width:35px; height:35px;
  border:1px solid #444;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  cursor:pointer;
}
.X { color:#00eaff; }
.O { color:#ff4d88; }
</style>
</head>
 
<body>
 
<h2>Caro (HTML Only)</h2>
<p id="status">Turn: X</p>
 
<div id="board"></div>
 
<button onclick="restart()">Restart</button>
 
<script>
const size = 15;
let board = [];
let turn = "X";
let gameOver = false;
 
const boardDiv = document.getElementById("board");
 
function init() {
  board = [];
  boardDiv.innerHTML = "";
  gameOver = false;
  turn = "X";
 
  for (let i=0;i<size;i++){
    board[i] = [];
    for (let j=0;j<size;j++){
      board[i][j] = "";
      let cell = document.createElement("div");
      cell.className = "cell";
      cell.onclick = () => move(i,j,cell);
      boardDiv.appendChild(cell);
    }
  }
 
  updateStatus();
}
 
function move(r,c,cell){
  if(board[r][c] || gameOver) return;
 
  board[r][c] = turn;
  cell.textContent = turn;
  cell.classList.add(turn);
 
  if(checkWin(r,c)){
    document.getElementById("status").innerText = turn + " wins!";
    gameOver = true;
    return;
  }
 
  turn = (turn==="X") ? "O" : "X";
  updateStatus();
}
 
function updateStatus(){
  document.getElementById("status").innerText = "Turn: " + turn;
}
 
function checkWin(r,c){
  function count(dx,dy){
    let cnt=0;
    let x=r, y=c;
 
    while(board[x] && board[x][y]===turn){
      cnt++; x+=dx; y+=dy;
    }
 
    x=r-dx; y=c-dy;
    while(board[x] && board[x][y]===turn){
      cnt++; x-=dx; y-=dy;
    }
    return cnt;
  }
 
  return (
    count(1,0)>=5 ||
    count(0,1)>=5 ||
    count(1,1)>=5 ||
    count(1,-1)>=5
  );
}
 
function restart(){
  init();
}
 
init();
</script>
 
</body>
</html>
